<g id="section1"><rect x="28" y="606" width="420" height="34" rx="17" fill="#0b66d9"/><circle cx="50" cy="623" r="16" fill="#fff" stroke="#9ec7fb"/><text x="50" y="630" text-anchor="middle" class="b blue mid">1</text><text x="78" y="629" class="b" font-size="18" fill="#fff">Con học thế nào trong lớp học số?</text></g>
<g id="cards"><g><rect x="28" y="655" width="232" height="190" rx="16" class="card"/><circle cx="51" cy="678" r="15" fill="#14a44d"/><text x="51" y="685" text-anchor="middle" class="b" font-size="18" fill="#fff">1</text><use href="#classroom" x="108" y="668" width="56"/><text x="144" y="740" text-anchor="middle" class="b green body">Nhận bài và hướng dẫn</text><text x="144" y="760" text-anchor="middle" class="b green body">trên Google Classroom</text><text x="144" y="805" text-anchor="middle" class="body gray">Giáo viên giao bài, chia sẻ</text><text x="144" y="825" text-anchor="middle" class="body gray">học liệu và hướng dẫn rõ ràng.</text></g><g><rect x="274" y="655" width="232" height="190" rx="16" class="card"/><circle cx="297" cy="678" r="15" fill="#f59e0b"/><text x="297" y="685" text-anchor="middle" class="b" font-size="18" fill="#fff">2</text><use href="#file" x="333" y="670" width="32" fill="#4285f4"/><use href="#file" x="375" y="670" width="32" fill="#34a853"/><use href="#file" x="417" y="670" width="32" fill="#fbbc04"/><text x="390" y="735" text-anchor="middle" class="b green body">Học tập, soạn bài,</text><text x="390" y="755" text-anchor="middle" class="b green body">trình bày trên</text><text x="390" y="775" text-anchor="middle" class="b green body">Docs, Sheets, Slides</text><text x="390" y="815" text-anchor="middle" class="body gray">Soạn thảo, tính toán, thiết kế</text><text x="390" y="835" text-anchor="middle" class="body gray">slide và làm việc mọi lúc, mọi nơi.</text></g><g><rect x="520" y="655" width="232" height="190" rx="16" class="card"/><circle cx="543" cy="678" r="15" fill="#673ab7"/><text x="543" y="685" text-anchor="middle" class="b" font-size="18" fill="#fff">3</text><use href="#file" x="620" y="670" width="34" fill="#673ab7"/><text x="636" y="735" text-anchor="middle" class="b purple body">Làm bài tập, bài kiểm tra</text><text x="636" y="755" text-anchor="middle" class="b purple body">và khảo sát trên</text><text x="636" y="775" text-anchor="middle" class="b purple body">Google Forms</text><text x="636" y="815" text-anchor="middle" class="body gray">Nộp bài, làm bài kiểm tra</text><text x="636" y="835" text-anchor="middle" class="body gray">và nhận kết quả nhanh chóng.</text></g><g><rect x="766" y="655" width="260" height="190" rx="16" class="card"/><circle cx="789" cy="678" r="15" fill="#e92929"/><text x="789" y="685" text-anchor="middle" class="b" font-size="18" fill="#fff">4</text><use href="#gmail" x="830" y="672" width="42"/><use href="#meet" x="890" y="668" width="44"/><use href="#drive" x="950" y="670" width="38"/><text x="896" y="735" text-anchor="middle" class="b" font-size="13" fill="#111">Trao đổi, họp lớp,</text><text x="896" y="755" text-anchor="middle" class="b" font-size="13" fill="#111">nhận phản hồi qua</text><text x="896" y="775" text-anchor="middle" class="b red body">Gmail, Meet và Drive</text><text x="896" y="815" text-anchor="middle" class="body gray">Liên lạc nhanh, học trực tuyến</text><text x="896" y="835" text-anchor="middle" class="body gray">và lưu trữ tài liệu an toàn.</text></g></g>
<g id="section2"><rect x="28" y="866" width="490" height="34" rx="17" fill="#14a44d"/><circle cx="50" cy="883" r="16" fill="#fff" stroke="#b6e7c3"/><text x="50" y="890" text-anchor="middle" class="b green mid">2</text><text x="78" y="889" class="b" font-size="18" fill="#fff">Những ứng dụng học sinh sẽ dùng thường xuyên</text></g>
<g id="apps"><g class="small"><rect x="28" y="914" width="810" height="120" rx="14" fill="#fff" stroke="#e4edf7"/><use href="#classroom" x="46" y="928" width="45"/><text x="68" y="978" text-anchor="middle" class="b green">Classroom</text><text x="68" y="998" text-anchor="middle">Quản lý lớp học</text><use href="#file" x="150" y="928" width="32" fill="#4285f4"/><text x="166" y="978" text-anchor="middle" class="b blue">Docs</text><text x="166" y="998" text-anchor="middle">Soạn thảo</text><use href="#file" x="252" y="928" width="32" fill="#fbbc04"/><text x="268" y="978" text-anchor="middle" class="b orange">Slides</text><text x="268" y="998" text-anchor="middle">Trình bày</text><use href="#file" x="354" y="928" width="32" fill="#34a853"/><text x="370" y="978" text-anchor="middle" class="b green">Sheets</text><text x="370" y="998" text-anchor="middle">Dữ liệu</text><use href="#file" x="456" y="928" width="32" fill="#673ab7"/><text x="472" y="978" text-anchor="middle" class="b purple">Forms</text><text x="472" y="998" text-anchor="middle">Bài tập</text><use href="#drive" x="552" y="928" width="38"/><text x="570" y="978" text-anchor="middle" class="b green">Drive</text><text x="570" y="998" text-anchor="middle">Lưu trữ</text><use href="#gmail" x="650" y="933" width="38"/><text x="670" y="978" text-anchor="middle" class="b red">Gmail</text><text x="670" y="998" text-anchor="middle">Email</text><use href="#meet" x="750" y="930" width="42"/><text x="770" y="978" text-anchor="middle" class="b green">Meet</text><text x="770" y="998" text-anchor="middle">Họp online</text></g><rect x="850" y="898" width="176" height="136" rx="18" fill="#eef6ff"/><use href="#laptop" x="880" y="914" width="120"/><text x="938" y="1005" text-anchor="middle" class="b blue mid">Chromebook</text><text x="938" y="1024" text-anchor="middle" class="small gray">Thiết bị học tập lý tưởng</text></g>
<g id="benefits"><rect x="28" y="1054" width="492" height="34" rx="17" fill="#0b66d9"/><circle cx="50" cy="1071" r="16" fill="#fff"/><text x="50" y="1078" text-anchor="middle" class="b blue mid">3</text><text x="78" y="1077" class="b" font-size="18" fill="#fff">Lợi ích đối với học sinh</text><rect x="536" y="1054" width="490" height="34" rx="17" fill="#f59e0b"/><circle cx="558" cy="1071" r="16" fill="#fff"/><text x="558" y="1078" text-anchor="middle" class="b orange mid">4</text><text x="586" y="1077" class="b" font-size="18" fill="#fff">Lợi ích đối với phụ huynh và nhà trường</text>
<g font-size="12"><rect x="28" y="1100" width="492" height="210" rx="12" class="card"/><text x="60" y="1128" class="b blue body">📘 Dễ tiếp cận học liệu</text><text x="60" y="1168" class="b blue body">💻 Rèn kỹ năng số</text><text x="60" y="1208" class="b blue body">👥 Hợp tác hiệu quả</text><text x="60" y="1248" class="b blue body">💡 Sáng tạo và thuyết trình tốt hơn</text><text x="60" y="1288" class="b blue body">📈 Tự học tốt hơn</text><rect x="536" y="1100" width="490" height="210" rx="12" class="card"/><text x="570" y="1128" class="b orange body">👥 Dễ phối hợp cùng giáo viên</text><text x="570" y="1168" class="b orange body">📊 Nắm bắt hành trình học tập của con</text><text x="570" y="1208" class="b orange body">◔ Dữ liệu học tập rõ ràng</text><text x="570" y="1248" class="b orange body">🛡 Môi trường học tập an toàn</text><text x="570" y="1288" class="b orange body">⚙ Quản lý tập trung, hiệu quả</text></g></g>
