<!doctype html>
<html lang="vi"><head><meta charset="utf-8"><title>Export poster</title></head><body>
<h1>Cong cu xuat poster in an</h1>
<p>Chon anh poster goc, sau do tai ban PNG A4 300DPI.</p>
<input id="file" type="file" accept="image/*">
<button onclick="downloadPNG()">Tai PNG A4 300DPI</button>
<button onclick="window.print()">In hoac luu PDF</button>
<div><img id="img" style="max-width:100%;"></div>
<script>
let loaded=false;const i=document.getElementById('img');document.getElementById('file').onchange=e=>{const f=e.target.files[0];if(f){i.src=URL.createObjectURL(f);loaded=true;}};
function downloadPNG(){if(!loaded){alert('Chon anh truoc');return;}const c=document.createElement('canvas');c.width=2480;c.height=3508;const x=c.getContext('2d');x.imageSmoothingEnabled=true;x.imageSmoothingQuality='high';x.drawImage(i,0,0,c.width,c.height);const a=document.createElement('a');a.download='poster-a4-300dpi.png';a.href=c.toDataURL('image/png');a.click();}
</script>
</body></html>
