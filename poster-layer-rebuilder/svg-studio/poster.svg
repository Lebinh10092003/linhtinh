<g id="title"><text x="415" y="165" text-anchor="middle" class="b blue title">LỚP HỌC SỐ:</text><text x="700" y="165" text-anchor="middle" class="b red title">CON HỌC GÌ,</text><text x="527" y="225" text-anchor="middle" class="b title"><tspan fill="#f59e0b">HỌC THẾ NÀO,</tspan><tspan fill="#14a44d"> HỌC BẰNG GÌ?</tspan></text><text x="527" y="268" text-anchor="middle" class="m blue" font-size="16">Với Google Workspace for Education, học sinh được học tập</text><text x="527" y="291" text-anchor="middle" class="m blue" font-size="16">trên một hệ sinh thái hiện đại giúp tăng hiệu quả, kết nối và kỹ năng số.</text><use href="#drive" x="585" y="312" width="35"/><use href="#file" x="635" y="310" width="30" fill="#4285f4"/><use href="#file" x="680" y="310" width="30" fill="#34a853"/><use href="#file" x="725" y="310" width="30" fill="#fbbc04"/><use href="#file" x="770" y="310" width="30" fill="#673ab7"/><use href="#gmail" x="816" y="320" width="38"/><use href="#meet" x="870" y="316" width="40"/></g>
