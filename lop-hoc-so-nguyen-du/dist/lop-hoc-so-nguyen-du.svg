<g class="s gray"><text x="70" y="1415">• Dễ tiếp cận học liệu mọi lúc, mọi nơi</text><text x="70" y="1475">• Rèn kỹ năng số và làm việc nhóm</text><text x="70" y="1535">• Sáng tạo, thuyết trình, tự học tốt hơn</text><text x="660" y="1415">• Phối hợp nhanh cùng giáo viên</text><text x="660" y="1475">• Nắm bắt tiến độ, kết quả học tập</text><text x="660" y="1535">• Quản lý tập trung, bảo mật và hiệu quả</text></g>
