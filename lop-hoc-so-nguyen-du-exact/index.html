<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lớp học số - đúng mẫu</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#eef3fb;font-family:Arial,Helvetica,sans-serif;color:#123}.toolbar{position:sticky;top:0;z-index:10;background:#fff;padding:10px 14px;display:flex;gap:10px;align-items:center;box-shadow:0 2px 12px #0002;flex-wrap:wrap}button{border:0;background:#0969d8;color:#fff;border-radius:8px;padding:10px 14px;font-weight:700;cursor:pointer}.note{font-size:13px;color:#334155}.wrap{padding:18px;display:flex;justify-content:center}.canvas{width:min(1054px,100%);background:white;box-shadow:0 14px 40px #0002}img{width:100%;display:block}@media print{.toolbar{display:none}body{background:white}.wrap{padding:0}.canvas{box-shadow:none;width:100%}}
</style>
</head>
<body>
<div class="toolbar">
  <button onclick="downloadOriginal()">Tải ảnh</button>
  <button onclick="window.print()">In / lưu PDF</button>
  <span class="note">Bản đúng mẫu sử dụng chính ảnh gốc làm nền. Để sửa từng chữ/icon cần file gốc Canva/Figma hoặc dựng lại thủ công theo layer.</span>
</div>
<div class="wrap"><div class="canvas"><img id="poster" alt="Poster lớp học số đúng mẫu" src="dist/lop-hoc-so-nguyen-du-exact.png"></div></div>
<script>
function downloadOriginal(){const a=document.createElement('a');a.href=document.getElementById('poster').src;a.download='lop-hoc-so-nguyen-du-dung-mau.png';a.click();}
</script>
</body>
</html>
