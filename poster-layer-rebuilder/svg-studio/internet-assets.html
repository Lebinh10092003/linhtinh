<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nguyễn Du Flyer - Official Assets Fixed</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#eef4fb;font-family:Arial,Helvetica,sans-serif;color:#0f172a}.bar{position:sticky;top:0;z-index:10;background:#fff;padding:10px 14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;box-shadow:0 2px 12px #0002}button,label,a{background:#0b66d9;color:#fff;border:0;border-radius:8px;padding:9px 12px;font-weight:700;text-decoration:none;cursor:pointer;font-size:14px}button:disabled{opacity:.45;cursor:not-allowed}label{background:#16a34a}input{display:none}.note{font-size:13px;color:#475569}.wrap{display:flex;justify-content:center;padding:18px}.stage{background:#fff;width:min(1054px,100%);box-shadow:0 12px 38px #0002}svg{width:100%;height:auto;display:block}@media print{.bar{display:none}.wrap{padding:0}.stage{width:100%;box-shadow:none}}
</style>
</head>
<body>
<div class="bar">
<label>Upload logo trường<input id="logoFile" type="file" accept="image/*"></label>
<label>Upload ảnh banner<input id="heroFile" type="file" accept="image/*"></label>
<button id="btnSvg" onclick="downloadSvg()" disabled>Download SVG</button>
<button id="btnPng2" onclick="downloadPng(2)" disabled>PNG 2x</button>
<button id="btnPng4" onclick="downloadPng(4)" disabled>PNG 4x</button>
<button onclick="window.print()">Print/PDF</button>
<a href="asset-sources.json">Nguồn assets</a>
<span id="status" class="note">Đang tải icon chuẩn từ Internet...</span>
</div>
<div class="wrap"><div id="stage" class="stage"></div></div>
<script>
const ASSETS={
 classroom:'https://commons.wikimedia.org/wiki/Special:FilePath/Google_Classroom_Logo.svg',
 docs:'https://commons.wikimedia.org/wiki/Special:FilePath/Google_Docs_2020_Logo.svg',
 sheets:'https://commons.wikimedia.org/wiki/Special:FilePath/Google_Sheets_2020_Logo.svg',
 slides:'https://commons.wikimedia.org/wiki/Special:FilePath/Google_Slides_2020_Logo.svg',
 forms:'https://commons.wikimedia.org/wiki/Special:FilePath/Google_Forms_2020_Logo.svg',
 drive:'https://commons.wikimedia.org/wiki/Special:FilePath/Google_Drive_icon_(2020).svg',
 gmail:'https://commons.wikimedia.org/wiki/Special:FilePath/Gmail_icon_(2020).svg',
 meet:'https://commons.wikimedia.org/wiki/Special:FilePath/Google_Meet_icon_(2020).svg'
};
let assetMap={}, ready=false;
const statusEl=document.getElementById('status');
const buttons=['btnSvg','btnPng2','btnPng4'].map(id=>document.getElementById(id));
function fallbackIcon(label,color){const s=`<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80"><rect width="80" height="80" rx="14" fill="${color}"/><text x="40" y="48" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="white">${label}</text></svg>`;return 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(s)}
async function toDataUrl(url){const r=await fetch(url,{mode:'cors'});if(!r.ok)throw new Error(url);const b=await r.blob();return await new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.onerror=rej;fr.readAsDataURL(b)})}
async function loadAssets(){const fb={classroom:['Class','#34a853'],docs:['Docs','#4285f4'],sheets:['Sheets','#34a853'],slides:['Slides','#fbbc04'],forms:['Forms','#673ab7'],drive:['Drive','#0f9d58'],gmail:['Gmail','#ea4335'],meet:['Meet','#34a853']};let fail=[];for(const [k,u] of Object.entries(ASSETS)){try{assetMap[k]=await toDataUrl(u)}catch(e){assetMap[k]=fallbackIcon(...fb[k]);fail.push(k)}}renderPoster();ready=true;buttons.forEach(b=>b.disabled=false);statusEl.textContent=fail.length?`Đã tải xong, ${fail.length} icon dùng fallback do nguồn ngoài chặn.`:'Đã tải xong icon chuẩn, có thể tải SVG/PNG.'}
function img(k,x,y,w,h=''){return `<image data-key="${k}" href="${assetMap[k]||''}" x="${x}" y="${y}" width="${w}" ${h?`height="${h}"`:''} preserveAspectRatio="xMidYMid meet"/>`}
function posterSvg(){return `<svg id="poster" xmlns="http://www.w3.org/2000/svg" width="1054" height="1493" viewBox="0 0 1054 1493"><defs><linearGradient id="footer" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#005fce"/><stop offset="1" stop-color="#0b72e4"/></linearGradient><clipPath id="heroClip"><rect x="28" y="300" width="998" height="288" rx="22"/></clipPath><style>text{font-family:Arial,Helvetica,sans-serif}.b{font-weight:800}.m{font-weight:600}.blue{fill:#0b66d9}.green{fill:#14a44d}.red{fill:#e92929}.orange{fill:#f59e0b}.purple{fill:#673ab7}.gray{fill:#334155}.card{fill:#fff;stroke:#e2e8f0;stroke-width:1.2}.body{font-size:13px}.small{font-size:11px}</style></defs><rect width="1054" height="1493" fill="#fff"/><g id="decor"><g fill="#8bb7ff"><circle cx="20" cy="170" r="3"/><circle cx="40" cy="170" r="3"/><circle cx="60" cy="170" r="3"/><circle cx="20" cy="190" r="3"/><circle cx="40" cy="190" r="3"/><circle cx="60" cy="190" r="3"/><circle cx="20" cy="210" r="3"/><circle cx="40" cy="210" r="3"/><circle cx="60" cy="210" r="3"/></g><path d="M930 205a135 135 0 0 1 124-88v104a135 135 0 0 0-88 28z" fill="#e92929"/><path d="M899 295a195 195 0 0 1 76-116 165 165 0 0 1 79 24v95a170 170 0 0 0-155-3z" fill="#14a44d"/><path d="M973 312a150 150 0 0 1 81-26v72a180 180 0 0 0-72 12z" fill="#fbbc04"/></g><g id="header"><rect x="20" y="20" width="105" height="105" rx="10" fill="#f8fbff" stroke="#dbeafe"/><image id="schoolLogo" x="20" y="20" width="105" height="105" preserveAspectRatio="xMidYMid meet"/><text x="142" y="56" class="b blue" font-size="14">TRƯỜNG TRUNG HỌC CƠ SỞ</text><text x="142" y="95" class="b blue" font-size="30">NGUYỄN DU</text><text x="710" y="54" font-size="30" class="m"><tspan fill="#4285f4">G</tspan><tspan fill="#db4437">o</tspan><tspan fill="#f4b400">o</tspan><tspan fill="#4285f4">g</tspan><tspan fill="#0f9d58">l</tspan><tspan fill="#db4437">e</tspan><tspan fill="#444" font-weight="400"> for Education</tspan></text></g><g id="title"><text x="415" y="165" text-anchor="middle" class="b blue" font-size="42">LỚP HỌC SỐ:</text><text x="705" y="165" text-anchor="middle" class="b red" font-size="42">CON HỌC GÌ,</text><text x="527" y="225" text-anchor="middle" class="b" font-size="42"><tspan fill="#f59e0b">HỌC THẾ NÀO,</tspan><tspan fill="#14a44d"> HỌC BẰNG GÌ?</tspan></text><text x="527" y="264" text-anchor="middle" class="m blue" font-size="16">Với Google Workspace for Education, học sinh được học tập</text><text x="527" y="286" text-anchor="middle" class="m blue" font-size="16">trên một hệ sinh thái hiện đại giúp tăng hiệu quả, kết nối và kỹ năng số.</text></g><g id="iconRow">${img('drive',590,310,34)}${img('docs',638,310,34)}${img('sheets',686,310,34)}${img('slides',734,310,34)}${img('forms',782,310,34)}${img('gmail',835,310,38)}${img('meet',890,310,38)}</g><g id="hero"><rect x="28" y="300" width="998" height="288" rx="22" fill="#f8fbff" stroke="#dbeafe"/><image id="heroImage" x="28" y="300" width="998" height="288" preserveAspectRatio="xMidYMid slice" clip-path="url(#heroClip)"/><text id="heroText" x="527" y="445" text-anchor="middle" class="b blue" font-size="26">UPLOAD ẢNH BANNER CHẤT LƯỢNG CAO</text></g><g id="s1"><rect x="28" y="604" width="418" height="34" rx="17" fill="#0b66d9"/><circle cx="50" cy="621" r="16" fill="#fff" stroke="#0b66d9"/><text x="50" y="628" text-anchor="middle" class="b blue" font-size="18">1</text><text x="78" y="627" class="b" font-size="18" fill="#fff">Con học thế nào trong lớp học số?</text><rect x="28" y="650" width="232" height="194" rx="18" class="card"/><circle cx="53" cy="675" r="15" fill="#14a44d"/><text x="53" y="682" text-anchor="middle" class="b" font-size="18" fill="#fff">1</text>${img('classroom',109,663,54)}<text x="144" y="745" text-anchor="middle" class="b green body">Nhận bài và hướng dẫn</text><text x="144" y="765" text-anchor="middle" class="b green body">trên Google Classroom</text><text x="144" y="808" text-anchor="middle" class="body gray">Giáo viên giao bài, chia sẻ</text><text x="144" y="826" text-anchor="middle" class="body gray">học liệu và hướng dẫn rõ ràng.</text><rect x="274" y="650" width="232" height="194" rx="18" class="card"/><circle cx="299" cy="675" r="15" fill="#f59e0b"/><text x="299" y="682" text-anchor="middle" class="b" font-size="18" fill="#fff">2</text>${img('docs',335,664,34)}${img('sheets',379,664,34)}${img('slides',423,664,34)}<text x="390" y="735" text-anchor="middle" class="b green body">Học tập, soạn bài,</text><text x="390" y="755" text-anchor="middle" class="b green body">trình bày trên</text><text x="390" y="775" text-anchor="middle" class="b green body">Docs, Sheets, Slides</text><text x="390" y="815" text-anchor="middle" class="body gray">Soạn thảo, tính toán, thiết kế</text><text x="390" y="833" text-anchor="middle" class="body gray">slide và làm việc mọi lúc, mọi nơi.</text><rect x="520" y="650" width="232" height="194" rx="18" class="card"/><circle cx="545" cy="675" r="15" fill="#673ab7"/><text x="545" y="682" text-anchor="middle" class="b" font-size="18" fill="#fff">3</text>${img('forms',620,664,38)}<text x="636" y="740" text-anchor="middle" class="b purple body">Làm bài tập, bài kiểm tra</text><text x="636" y="760" text-anchor="middle" class="b purple body">và khảo sát trên Google Forms</text><text x="636" y="805" text-anchor="middle" class="body gray">Nộp bài, làm bài kiểm tra</text><text x="636" y="823" text-anchor="middle" class="body gray">nhận kết quả nhanh chóng.</text><rect x="766" y="650" width="260" height="194" rx="18" class="card"/><circle cx="791" cy="675" r="15" fill="#e92929"/><text x="791" y="682" text-anchor="middle" class="b" font-size="18" fill="#fff">4</text>${img('gmail',830,666,42)}${img('meet',890,664,42)}${img('drive',952,666,38)}<text x="896" y="735" text-anchor="middle" class="b red body">Gmail, Meet và Drive</text><text x="896" y="805" text-anchor="middle" class="body gray">Liên lạc nhanh, học trực tuyến</text><text x="896" y="823" text-anchor="middle" class="body gray">và lưu trữ tài liệu an toàn.</text></g><g id="s2"><rect x="28" y="866" width="500" height="34" rx="17" fill="#14a44d"/><circle cx="50" cy="883" r="16" fill="#fff" stroke="#14a44d"/><text x="50" y="890" text-anchor="middle" class="b green" font-size="18">2</text><text x="78" y="889" class="b" font-size="18" fill="#fff">Những ứng dụng học sinh sẽ dùng thường xuyên</text><rect x="28" y="914" width="810" height="120" rx="14" fill="#fff" stroke="#e2e8f0"/>${img('classroom',58,930,40)}${img('docs',160,930,36)}${img('slides',260,930,36)}${img('sheets',360,930,36)}${img('forms',460,930,36)}${img('drive',560,930,40)}${img('gmail',660,930,40)}${img('meet',760,930,40)}<text x="80" y="1000" text-anchor="middle" class="b green small">Classroom</text><text x="180" y="1000" text-anchor="middle" class="b blue small">Docs</text><text x="280" y="1000" text-anchor="middle" class="b orange small">Slides</text><text x="380" y="1000" text-anchor="middle" class="b green small">Sheets</text><text x="480" y="1000" text-anchor="middle" class="b purple small">Forms</text><text x="580" y="1000" text-anchor="middle" class="b green small">Drive</text><text x="680" y="1000" text-anchor="middle" class="b red small">Gmail</text><text x="780" y="1000" text-anchor="middle" class="b green small">Meet</text><rect x="850" y="898" width="176" height="136" rx="18" fill="#eef6ff"/><text x="938" y="1008" text-anchor="middle" class="b blue" font-size="18">Chromebook</text></g><g id="benefits"><rect x="28" y="1055" width="492" height="34" rx="17" fill="#0b66d9"/><text x="78" y="1077" class="b" font-size="18" fill="#fff">3  Lợi ích đối với học sinh</text><rect x="536" y="1055" width="490" height="34" rx="17" fill="#f59e0b"/><text x="586" y="1077" class="b" font-size="18" fill="#fff">4  Lợi ích đối với phụ huynh và nhà trường</text><rect x="28" y="1100" width="492" height="210" rx="12" class="card"/><rect x="536" y="1100" width="490" height="210" rx="12" class="card"/><text x="60" y="1130" class="b blue body">📘 Dễ tiếp cận học liệu</text><text x="60" y="1170" class="b blue body">💻 Rèn kỹ năng số</text><text x="60" y="1210" class="b blue body">👥 Hợp tác hiệu quả</text><text x="60" y="1250" class="b blue body">💡 Sáng tạo và thuyết trình tốt hơn</text><text x="60" y="1290" class="b blue body">📈 Tự học tốt hơn</text><text x="570" y="1130" class="b orange body">👥 Dễ phối hợp cùng giáo viên</text><text x="570" y="1170" class="b orange body">📊 Nắm bắt hành trình học tập của con</text><text x="570" y="1210" class="b orange body">◔ Dữ liệu học tập rõ ràng</text><text x="570" y="1250" class="b orange body">🛡 Môi trường học tập an toàn</text><text x="570" y="1290" class="b orange body">⚙ Quản lý tập trung, hiệu quả</text></g><g id="device"><rect x="28" y="1320" width="250" height="34" rx="17" fill="#0b66d9"/><text x="78" y="1343" class="b" font-size="18" fill="#fff">5  Con học bằng gì?</text><rect x="28" y="1360" width="998" height="86" rx="18" fill="#f5fbff" stroke="#cfe4fb"/><text x="310" y="1395" text-anchor="middle" class="b blue" font-size="20">Chromebook</text><text x="520" y="1395" text-anchor="middle" class="b blue small">🚀 Khởi động nhanh</text><text x="660" y="1395" text-anchor="middle" class="b green small">☝ Dễ dàng</text><text x="790" y="1395" text-anchor="middle" class="b orange small">🔋 Pin lâu</text><text x="920" y="1395" text-anchor="middle" class="b red small">🛡 Bảo mật tốt</text></g><g id="footer"><rect x="0" y="1458" width="1054" height="35" fill="url(#footer)"/><text x="70" y="1481" class="b" font-size="16" fill="#fff">☎ THÔNG TIN LIÊN HỆ</text><text x="380" y="1481" class="m" font-size="16" fill="#fff">◎ Website: c2nguyendu-ntl.edu.vn</text><text x="795" y="1481" class="m" font-size="16" fill="#fff">☎ 024 3201 1356</text></g></svg>`}
function renderPoster(){document.getElementById('stage').innerHTML=posterSvg()}
function readFile(input,cb){const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=()=>cb(r.result);r.readAsDataURL(f)}
logoFile.onchange=e=>readFile(e.target,u=>{document.getElementById('schoolLogo').setAttribute('href',u)});
heroFile.onchange=e=>readFile(e.target,u=>{document.getElementById('heroImage').setAttribute('href',u);const t=document.getElementById('heroText');if(t)t.remove()});
function svgText(){return new XMLSerializer().serializeToString(document.getElementById('poster'))}
function downloadSvg(){if(!ready)return;const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([svgText()],{type:'image/svg+xml'}));a.download='nguyen-du-official-assets-fixed.svg';a.click()}
function downloadPng(scale){if(!ready)return;const url=URL.createObjectURL(new Blob([svgText()],{type:'image/svg+xml'}));const im=new Image();im.onload=()=>{const c=document.createElement('canvas');c.width=1054*scale;c.height=1493*scale;const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);ctx.drawImage(im,0,0,c.width,c.height);URL.revokeObjectURL(url);const a=document.createElement('a');a.download=`nguyen-du-official-assets-${scale}x.png`;a.href=c.toDataURL('image/png');a.click()};im.onerror=()=>alert('Không xuất được PNG. Hãy bấm Download SVG.');im.src=url}
renderPoster();loadAssets();
</script>
</body>
</html>
