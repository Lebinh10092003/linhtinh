<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Nguyễn Du Flyer SVG Studio</title>
<style>
  body{margin:0;background:#eef4fb;font-family:Arial,Helvetica,sans-serif;color:#0f172a}
  .toolbar{position:sticky;top:0;z-index:10;background:#fff;padding:12px 16px;display:flex;gap:10px;align-items:center;box-shadow:0 2px 14px #0002;flex-wrap:wrap}
  button,a.btn{border:0;background:#0b66d9;color:#fff;border-radius:9px;padding:10px 14px;font-weight:700;cursor:pointer;text-decoration:none;font-size:14px}
  button.secondary{background:#16a34a}.note{font-size:13px;color:#475569}.wrap{padding:22px;display:flex;justify-content:center}.frame{width:min(1054px,100%);background:#fff;box-shadow:0 18px 50px #0002}.frame object{width:100%;display:block;aspect-ratio:1054/1493}
  @media print{.toolbar{display:none}.wrap{padding:0}.frame{width:100%;box-shadow:none}body{background:#fff}}
</style>
</head>
<body>
<div class="toolbar">
  <a class="btn" href="poster.svg" download="nguyen-du-flyer.svg">Download SVG</a>
  <button onclick="downloadPng(2)">Download PNG 2x</button>
  <button class="secondary" onclick="downloadPng(4)">Download PNG 4x</button>
  <button onclick="window.print()">Print / Save PDF</button>
  <span class="note">SVG dựng lại bằng vector, có group/layer; mở tốt bằng Figma, Inkscape, Illustrator.</span>
</div>
<div class="wrap"><div class="frame"><object id="posterObject" data="poster.svg" type="image/svg+xml"></object></div></div>
<script>
async function downloadPng(scale){
  const svgText = await fetch('poster.svg').then(r=>r.text());
  const svgBlob = new Blob([svgText], {type:'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(svgBlob);
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = 1054 * scale;
    canvas.height = 1493 * scale;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.download = `nguyen-du-flyer-${scale}x.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  img.src = url;
}
</script>
</body>
</html>
